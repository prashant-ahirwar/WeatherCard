<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>WeatherCard</title>

  <link
    rel="stylesheet"
    href="styles.css"
  />

</head>

<body>

  <div class="card">

    <div class="top">

      <div>

        <h1 id="city">
          📍 Detecting location...
        </h1>

        <p class="info">

          <span id="condition">
            --
          </span>

          <span
            class="wind"
            id="wind"
          >
            🍃 Wind: -- km/h
          </span>

        </p>

      </div>



      <!-- SEARCH -->

      <div class="search-box">

        <button id="searchBtn">
          🔍
        </button>

        <div id="searchPanel">

          <input
            type="text"
            id="searchInput"
            placeholder="Search city..."
          />

          <button id="myLocationBtn">

            📍 My Location

          </button>

        </div>

      </div>

    </div>



    <!-- WEATHER -->

    <div class="weather-box">

      <div class="sky">

        <img
          id="weatherImage"
          src=""
          alt="Weather Illustration"
        />

      </div>

      <span
        class="temperature"
        id="temp"
      >
        --°C
      </span>

    </div>



    <!-- EXTRA INFO -->

    <div class="extra-info">

      <div class="info-box">

        <h3>
          Humidity
        </h3>

        <p id="humidity">
          --%
        </p>

      </div>

      <div class="info-box">

        <h3>
          Feels Like
        </h3>

        <p id="feelsLike">
          --°C
        </p>

      </div>

    </div>



    <!-- FORECAST -->

    <h2>
      7-Days Forecast
    </h2>

    <table>

      <thead>

        <tr class="heading">

          <td>Day</td>
          <td>Temp.</td>

        </tr>

      </thead>

      <tbody id="forecast"></tbody>

    </table>



    <!-- FOOTER -->

    <div class="footer">

      <p id="updated">
        Last updated: --
      </p>

    </div>



    <!-- CREATOR -->

    <div class="creator">

      <p>
        🎨 Designed by Prashant A.
      </p>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
